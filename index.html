<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Chug! Chug!">
	<link rel="apple-touch-icon" href="appicon.png">
	<link rel="icon" type="image/svg+xml" href="appicon.svg">
	<title>Chug! Chug!</title>
	<style>
		@media screen and (orientation: landscape) and (hover: none) and (pointer: coarse) {
			html {
				transform: rotate(-90deg);
				transform-origin: left top;
				width: 100vh !important;
				height: 100vw !important;
				position: absolute;
				top: 100%;
				left: 0;
			}
		}
		
		/* Reset */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
			user-select: none;
			-webkit-user-select: none;
		}

		/* Variables */
		:root {
			--water-blue: #007AFF;
			--water-blue-light: #878aa7;
			--water-blue-very-light: #cfe3ff;
			--recent-entry-fade-ms: 8000ms;
		}

		/* Base */
		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
			background: #fff;
		}
		body {
			min-height: 1px;
		}
		html, body, input, button, select, textarea {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			font-size: 16px;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}

		button:not(.disabled):not(:disabled).hover,
		.entry.hover {
			background: color-mix(in srgb, var(--water-blue-light), white 90%);
		}
		@media screen and (hover: hover) and (pointer: fine) {
			button:not(.disabled):not(:disabled):hover,
			.entry:hover {
				background: color-mix(in srgb, var(--water-blue-light), white 90%);
				cursor: pointer;
			}
		}

		button:disabled {
			cursor: default !important;
		}

		svg {
			fill: currentColor;
		}

		/* Submit floating icon animation */
		@keyframes floatUp {
			0% {
				opacity: 1;
				transform: translate(-50%, -50%) scale(1);
			}
			100% {
				opacity: 0;
				transform: translate(-50%, -150%) scale(1.5);
			}
		}

		.floating-icon {
			position: fixed;
			left: 50%;
			top: 50%;
			z-index: 1000;
			width: calc(50% * min(100vw, 100vh));
			height: calc(50% * min(100vw, 100vh));
			pointer-events: none;
			animation: floatUp 1s ease-out forwards;
			color: var(--water-blue);
		}

		/* Layout */
		.app {
			height: 100%;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.header {
			flex: 0 0 auto;
			padding-top: env(safe-area-inset-top);
			background: rgba(255, 255, 255, 0.85);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			border-bottom: 1px solid rgba(0, 0, 0, 0.1);
			z-index: 2;
		}

		.header-content {
			height: 44px;
			position: relative;
			padding: 0 16px;
		}

		.header-side {
			position: absolute;
			top: 0;
			height: 44px;
			display: flex;
			gap: 4px;
			align-items: center;
		}
		.header-side-left {
			left: 20px;
		}
		.header-side-right {
			right: 20px;
		}

		.nav-button {
			width: 36px;
			height: 36px;
			background: color-mix(in srgb, var(--water-blue-light), white 94%);
			color: var(--water-blue);
			font-size: 24px;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 12px;
			border: solid 1px var(--water-blue-light);
		}

		.nav-button:disabled {
			opacity: 0.3;
		}

		.nav-button-settings .nav-button-settings-icon {
			width: 20px;
			height: 20px;
			transform: translateX(-0.5px);
		}
		.nav-button-settings.has-errors {
			color: #c62828;
			border-color: #c62828;
		}

		.week-display {
			position: absolute;
			left: 50%;
			top: 4px;
			transform: translateX(-50%);
			height: 36px;
			margin: 0;
			padding: 0 16px;
			border: none;
			font-size: 18px;
			font-weight: bold;
			border-radius: 12px;
			background: none;
			color: var(--water-blue); /* disabled means the week is the current week, so use blue text */
		}
		.week-display:not(.disabled) { /* not disabled if the week is not the current week, then it's black text */
			background: color-mix(in srgb, var(--water-blue-light), white 94%);
			border: solid 1px var(--water-blue-light);
			cursor: pointer;
			color: black;
		}

		/* Days list */
		.days {
			flex: 1 1 0;
			overflow-y: auto;
			padding: 0 16px;
			-webkit-overflow-scrolling: touch;
			display: flex;
			flex-direction: column;
		}

		.day {
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			height: calc((100% - 6px) / 7); /* total space minus borders divided by 7 */
			min-height: 44px;
			padding: 2px 0;
			border-bottom: 1px solid rgba(0, 0, 0, 0.1);
			gap: 8px;
		}

		.day.today .day-date, .day.today .day-sum {
			color: var(--water-blue);
			font-weight: bold;
		}

		.day-date {
			font-size: 15px;
			white-space: nowrap;
			width: 92px;
			text-align: right;
			cursor: pointer;
		}

		.day-entries {
			display: flex;
			flex-direction: row;
			gap: 6px;
			overflow-x: auto;
			-webkit-overflow-scrolling: touch;
			padding: 2px 0;
			min-height: 24px;
			direction: rtl;
		}
		.day-entries > * {
			direction: ltr;
		}

		.day-entries::-webkit-scrollbar {
			display: none; /* Hide scrollbar on iOS */
		}

		.entry {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 1px;
			flex: 0 0 auto;
			padding: 2px 4px;
			border-radius: 12px;
			border: solid 1px var(--water-blue-light);
			color: #000;
			transition: border-color var(--recent-entry-fade-ms) ease-out, color var(--recent-entry-fade-ms) ease-out;

		}
		.entry.recent {
			border-color: var(--water-blue);
			color: var(--water-blue);
		}
		.entry.recent .entry-time-row {
			color: var(--water-blue);
		}
		.entry.selected {
			border-color: var(--water-blue);
			background: var(--water-blue);
			color: #fff;
			font-weight: bold;
		}
		.entry.selected .entry-time-row {
			color: var(--water-blue-very-light);
		}

		.entry-time-row {
			display: flex;
			align-items: center;
			gap: 4px;
			color: var(--water-blue-light);
			font-size: 12px;
			font-weight: normal;
			transition: color var(--recent-entry-fade-ms) ease-out;
		}

		.entry-icon {
			width: 12px;
			height: 12px;
			fill: currentColor;
		}

		.entry-amount {
			font-size: 14px;
		}

		.day-sum {
			min-width: 40px;
		}

		.day-sum-count {
			text-align: right;
			font-size: 12px;
			color: var(--water-blue-light);
			white-space: nowrap;
		}
		.day-sum-liters {
			text-align: right;
			font-size: 14px;
			white-space: nowrap;
		}

		/* Input area */
		.input-wrapper {
			flex: 0 0 auto;
			padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
		}

		.input {
			background: color-mix(in srgb, var(--water-blue-light), white 86%);
			padding: 0 16px 20px 16px;
			border-radius: 14px;
		}

		/* Add styles for the edit header */
		.input-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			font-size: 18px;
			font-weight: bold;
			height: 48px;
		}

		.edit-actions {
			display: inline-flex;
			gap: 8px;
		}

		.input.mode-edit .input-header .caption-add, .input:not(.mode-edit) .input-header .caption-edit, .input:not(.mode-edit) .input-header .edit-actions {
			display: none;
		}

		.action-button {
			border: none;
			background: none;
			padding: 4px 8px;
			color: var(--water-blue);
			cursor: pointer;
			border-radius: 6px;
			height: 40px;
		}

		.action-button.hover {
			background: rgba(0, 122, 255, 0.1);
		}
		@media screen and (hover: hover) and (pointer: fine) {
			.action-button:hover {
				background: rgba(0, 122, 255, 0.1);
				cursor: pointer;
			}
		}

		.input-datetime-row {
			display: flex;
			gap: 8px;
			margin-bottom: 16px;
		}

		.input-datetime-wrapper {
			position: relative;
			flex: 1;
		}

		.input-datetime {
			width: 100%;
			padding: 12px 16px;
			border: none;
			border-radius: 10px;
			background: #fff;
		}

		.input-datetime-now {
			position: absolute;
			right: 16px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--water-blue-light);
			pointer-events: none;
		}
		.input-datetime-now.hidden {
			display: none;
		}

		.datetime-reset-button, .datetime-shift-button {
			padding: 0px 14px;
			flex: 0 0 auto;
			border: none;
			border-radius: 10px;
			background: #fff;
			color: var(--water-blue);
			font-size: 20px;
		}
		.datetime-reset-button.hidden {
			display: none;
		}

		.input-presets {
			display: flex;
			gap: 8px;
			margin-bottom: 12px;
		}

		.preset-button {
			flex: 1;
			padding: 8px;
			border: 1px solid var(--water-blue);
			border-radius: 8px;
			background: #fff;
			color: var(--water-blue);
			font-size: 17px;
			writing-mode: vertical-rl;
			transform: rotate(180deg);
			text-orientation: sideways;
		}
		.preset-button-current, button.preset-button.preset-button-current.hover {
			background: var(--water-blue);
			color: #fff;
		}
		@media screen and (hover: hover) and (pointer: fine) {
			button.preset-button.preset-button-current:hover {
				background: var(--water-blue);
				color: #fff;
			}
		}

		.input-numpad {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 1px;
			background: rgba(118, 118, 128, 0.12);
			border-radius: 10px;
			overflow: hidden;
			margin-bottom: 12px;
		}

		.num-button {
			height: 40px;
			border: none;
			background: #fff;
			font-size: 17px;
			color: var(--water-blue);
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.num-button:disabled {
			color: #999;
		}

		.input-submit {
			display: grid;
			grid-template-columns: 1fr auto 1fr;
			gap: 22px;
			align-items: center;
		}

		.submit-button {
			padding: 10px 4px;
			border: none;
			border-radius: 8px;
			background: var(--water-blue);
			color: #fff;
			font-size: 17px;
			font-weight: 500;
		}
		.input.mode-edit .submit-button:not(.selected) {
			background: #fff;
			color: var(--water-blue);
			outline: solid 1px var(--water-blue);
		}
		.submit-button:disabled {
			background: #fff;
			color: #999;
		}
		.submit-button:not(:disabled).hover {
			color: var(--water-blue);
			outline: solid 1px var(--water-blue);
		}
		@media screen and (hover: hover) and (pointer: fine) {
			.submit-button:not(:disabled):hover {
				color: var(--water-blue);
				outline: solid 1px var(--water-blue);
				cursor: pointer;
			}
		}
		.submit-button svg {
			width: 16px;
			height: 16px;
		}
		.submit-button#submitFilled svg {
			margin-right: 4px;
		}
		.submit-button#submitDrunk svg {
			margin-left: 4px;
		}

		.amount-display {
			font-weight: bold;
			width: 50px;
			padding-right: 5px;
			text-align: right;
		}
		.amount-display-typed {
			color: #000;
		}
		.amount-display-unit {
			color: #000;
			padding-left: 2px;
		}
		.amount-display-remaining, .amount-display-unit.grey {
			color: #999;
		}
	</style>
</head>
<body>

		<!-- Action Icons -->
		<symbol id="icon-delete" viewBox="0 0 24 24">

		<symbol id="icon-cancel" viewBox="0 0 24 24">
			<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>

	<div class="app">
		<!-- Header -->
		<header class="header">
			<div class="header-content">
				<div class="header-side header-side-left">
					<button class="nav-button" id="prevWeek"><svg width="24" height="24"><use href="#icon-arrow-left"></use></svg></button>
				</div>
				<button class="week-display" id="currentWeek"></button>
				<div class="header-side header-side-right">
					<button class="nav-button nav-button-settings" id="editSettings"><svg class="nav-button-settings-icon" viewBox="0 0 24 24"><use href="#icon-settings"></use></svg></button>
					<button class="nav-button" id="nextWeek" disabled><svg width="24" height="24"><use href="#icon-arrow-right"></use></svg></button>
				</div>
			</div>
		</header>

		<!-- Days list -->
		<div class="days">
			<!-- Days will be added here dynamically -->
		</div>

		<!-- Input area -->
		<div class="input-wrapper">
			<div class="input">
				<div class="input-header">
					<span class="caption-add">Eintrag hinzufügen</span>
					<span class="caption-edit">Bearbeiten</span>
					<span class="edit-actions edit-actions-hidden">
						<button class="action-button" id="deleteEntry"><svg width="24" height="24"><use href="#icon-delete"></use></svg></button>
						<button class="action-button" id="cancelEdit"><svg width="24" height="24"><use href="#icon-cancel"></use></svg></button>
					</span>
				</div>
				<div class="input-datetime-row">
					<div class="input-datetime-wrapper">
						<input type="text" class="input-datetime" id="datetime" placeholder="" value="">
						<span class="input-datetime-now" id="datetimeNow">Jetzt</span>
					</div>
					<button class="datetime-reset-button hidden" id="datetimeReset">↺</button>
					<button class="datetime-shift-button" id="datetimePrev">←</button>
					<button class="datetime-shift-button" id="datetimeNext">→</button>
				</div>
				<div class="input-presets">
				</div>
				<div class="input-numpad">
					<button class="num-button" data-value="1">1</button>
					<button class="num-button" data-value="2">2</button>
					<button class="num-button" data-value="3">3</button>
					<button class="num-button" data-value="4">4</button>
					<button class="num-button" data-value="5">5</button>
					<button class="num-button" data-value="6">6</button>
					<button class="num-button" data-value="7">7</button>
					<button class="num-button" data-value="8">8</button>
					<button class="num-button" data-value="9">9</button>
					<button class="num-button" data-value=".">.</button>
					<button class="num-button" data-value="0">0</button>
					<button class="num-button" data-value="←">←</button>
				</div>
				<div class="input-submit">
					<button class="submit-button" id="submitFilled"><svg width="24" height="24"><use href="#icon-filled"></use></svg> eingefüllt</button>
					<div class="amount-display">
						<span class="amount-display-typed"></span><span class="amount-display-remaining"></span><span class="amount-display-unit">ℓ</span>
					</div>
					<button class="submit-button" id="submitDrunk">getrunken <svg width="24" height="24"><use href="#icon-drunk"></use></svg></button>
				</div>
			</div>
		</div>
	</div>

	<script>
		// App Constants
		window.CONFIG = {
			// Data Management
			MAX_AGE_DAYS: 100,
			
			// Amount Presets (in liters)
			PRESETS: [0.25, 0.35, 0.42, 0.50, 0.60, 1.20],
			
			// Amount Constraints
			MAX_AMOUNT: 999,

			DAY_START_HOUR: 4,
			DATETIME_SHIFT_MINUTES: 30,
			RECENT_ENTRY_FADE_MS: 8000,
			WEBDAV_SETTINGS_KEY: 'webdav_settings',
			WEBDAV_UPDATED_AT_KEY: 'webdav_updated_at',
			WEBDAV_PREVIOUS_UPDATED_AT_KEY: 'webdav_previous_updated_at',
			WEBDAV_DEFAULT_FILE: 'NotSafe/water-sync.json',
			WEBDAV_SYNC_INTERVAL_MS: 10000,
			
			// Amount Formatting
			formatAmount: (amount) => {
				if (isNaN(amount)) amount = 0;
				// Convert to number and limit to 3 digits total
				amount = Math.min(Math.max(0, Number(amount)), CONFIG.MAX_AMOUNT);
				
				if (amount >= 100) {
					// No decimals for amounts >= 100
					return amount.toFixed(0);
				} else if (amount >= 10) {
					// One decimal for amounts >= 10
					return amount.toFixed(1);
				} else {
					// Two decimals for amounts < 10
					return amount.toFixed(2);
				}
			},
			
			// Date Formatting
			formatDate: (date, includeWeekday = false) => {
				if (includeWeekday) {
					const weekday = date.toLocaleDateString('de-DE', { weekday: 'short' });
					const day = date.getDate().toString().padStart(2, '0');
					const month = (date.getMonth() + 1).toString().padStart(2, '0');
					const year = date.getFullYear().toString().slice(-2);
					return `${weekday} ${day}.${month}.${year}`;
				} else {
					return date.toLocaleDateString('de-DE', {
						day: '2-digit',
						month: '2-digit',
						year: 'numeric'
					});
				}
			},
			
			formatTime: (date) => {
				return date.toLocaleTimeString('de-DE', {
					hour: '2-digit',
					minute: '2-digit',
					hour12: false
				});
			},
			
			// Week Calculation
			getWeekNumber: (date) => {
				const d = new Date(date);
				d.setDate(d.getDate() + 1); /* normal week day counting starts on Monday, below implementation respects that, we however want to start on Sunday (see getWeekDates()) */
				d.setHours(0, 0, 0, 0);
				d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
				const week1 = new Date(d.getFullYear(), 0, 4);
				return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
			},

			// Date Handling
			getDayDate: (date) => {
				// If it's before 4 AM, consider it part of the previous day
				const d = new Date(date);
				if (d.getHours() < CONFIG.DAY_START_HOUR) {
					d.setDate(d.getDate() - 1);
				}
				// Reset time to midnight for consistent comparison
				d.setHours(0, 0, 0, 0);
				return d;
			},

			isToday: (date) => {
				const today = CONFIG.getDayDate(new Date());
				const dayDate = new Date(date);
				dayDate.setHours(0, 0, 0, 0);
				return today.getTime() === dayDate.getTime();
			},
		};

		// We'll add more JavaScript code here
		
		// Data Management
		class WaterTracker {
			constructor() {
				document.documentElement.style.setProperty('--recent-entry-fade-ms', `${CONFIG.RECENT_ENTRY_FADE_MS}ms`);
				this.currentDate = CONFIG.getDayDate(new Date());
				this.today = new Date(this.currentDate);
				this.selectedEntry = null;
				this.currentAmountBeforeEdit = null;
				this.recentSubmittedEntry = null;
				this.webDavSettings = this.getWebDavSettings();
				this.webDavPollTimer = null;
				this.webDavPushTimer = null;
				this.isApplyingRemoteData = false;
				this.syncErrors = [];
				this.entryDate = new Date();
				this.entryDateIsSet = false;
				this.currentAmount = this.getLastAmount();
				this.cursorIndex = this.currentAmount ? CONFIG.formatAmount(this.currentAmount).length : 0;
				this.ensureWebDavSettings();
				
				// Load and cleanup data
				this.cleanup();
				
				// Initialize UI
				this.initializeUI();
				this.initializeWebDavSync();
				
				// Start time update
				this.startTimeUpdate();
			}

			startTimeUpdate() {
				const now = new Date();
				const nextMinute = new Date(now);
				nextMinute.setMinutes(now.getMinutes() + 1, 0, 0);
				const delay = nextMinute - now;

				setTimeout(() => {
					// Update entry date if not manually set
					if (!this.entryDateIsSet) {
						const entryDateString = this.formatDateTime(this.entryDate);
						this.entryDate = new Date();
						const input = document.getElementById('datetime');
						if (!input.matches(':focus') || input.value === entryDateString) {
							this.updateDateTimeInput();
						}
					}

					// Check if day has changed (considering 4 AM cutoff)
					const newToday = CONFIG.getDayDate(new Date());
					if (newToday.getTime() !== this.today.getTime()) {
						this.today = newToday;
						this.updateUI();
					}

					// Schedule next update
					this.startTimeUpdate();
				}, delay);
			}
			
			getLastAmount() {
				return parseFloat(localStorage.getItem('water_last_amount')) || 0;
			}

			saveLastAmount(amount) {
				localStorage.setItem('water_last_amount', CONFIG.formatAmount(amount));
				if (!this.isApplyingRemoteData) {
					this.scheduleWebDavPush();
				}
			}

			getWebDavSettings() {
				try {
					const raw = localStorage.getItem(CONFIG.WEBDAV_SETTINGS_KEY);
					if (!raw) {
						return null;
					}
					const parsed = JSON.parse(raw);
					if (!parsed.url || !parsed.username || !parsed.password) {
						return null;
					}
					return parsed;
				} catch (e) {
					return null;
				}
			}

			saveWebDavSettings(settings) {
				localStorage.setItem(CONFIG.WEBDAV_SETTINGS_KEY, JSON.stringify(settings));
				this.webDavSettings = settings;
			}

			promptWebDavSettings(existingSettings = null) {
				const current = existingSettings || {};
				const url = prompt('WebDAV URL', current.url || '');
				if (url === null) {
					return null;
				}
				const username = prompt('WebDAV username', current.username || '');
				if (username === null) {
					return null;
				}
				const password = prompt('WebDAV password', current.password || '');
				if (password === null) {
					return null;
				}
				const trimmedUrl = url.trim();
				const trimmedUsername = username.trim();
				if (!trimmedUrl || !trimmedUsername || !password) {
					alert('WebDAV settings were not saved. Please provide URL, username, and password.');
					return null;
				}
				return {
					url: trimmedUrl,
					username: trimmedUsername,
					password: password
				};
			}

			ensureWebDavSettings() {
				if (this.webDavSettings) {
					return;
				}
				const settings = this.promptWebDavSettings();
				if (settings) {
					this.saveWebDavSettings(settings);
				}
			}

			getWebDavFileUrl() {
				if (!this.webDavSettings || !this.webDavSettings.url) {
					return '';
				}
				const baseUrl = this.webDavSettings.url.trim();
				const defaultFile = CONFIG.WEBDAV_DEFAULT_FILE.replace(/^\/+/, '');
				const likelyFile = /\/[^\/]+\.[^\/]+$/.test(baseUrl);
				if (likelyFile) {
					return baseUrl;
				}
				if (baseUrl.endsWith('/')) {
					return baseUrl + defaultFile;
				}
				return `${baseUrl}/${defaultFile}`;
			}

			getWebDavAuthHeader() {
				if (!this.webDavSettings) {
					return '';
				}
				return `Basic ${btoa(`${this.webDavSettings.username}:${this.webDavSettings.password}`)}`;
			}

			getWaterDataSnapshot() {
				const data = {};
				const keys = [];
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key && key.startsWith('water_') && key !== 'water_last_amount') {
						keys.push(key);
					}
				}
				keys.sort().forEach(key => {
					data[key] = localStorage.getItem(key);
				});
				return data;
			}

			setWaterDataSnapshot(data) {
				const keysToRemove = [];
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key && key.startsWith('water_') && key !== 'water_last_amount') {
						keysToRemove.push(key);
					}
				}
				keysToRemove.forEach(key => localStorage.removeItem(key));
				Object.keys(data || {}).forEach(key => {
					localStorage.setItem(key, String(data[key]));
				});
			}

			getLocalWebDavUpdatedAt() {
				return localStorage.getItem(CONFIG.WEBDAV_UPDATED_AT_KEY) || '';
			}

			setLocalWebDavUpdatedAt(updatedAt) {
				if (updatedAt) {
					localStorage.setItem(CONFIG.WEBDAV_UPDATED_AT_KEY, updatedAt);
				}
			}

			// Currently not used by UI logic; kept for possible diagnostics/conflict tracing.
			getLocalWebDavPreviousUpdatedAt() {
				return localStorage.getItem(CONFIG.WEBDAV_PREVIOUS_UPDATED_AT_KEY) || '';
			}

			setLocalWebDavPreviousUpdatedAt(previousUpdatedAt) {
				if (previousUpdatedAt) {
					localStorage.setItem(CONFIG.WEBDAV_PREVIOUS_UPDATED_AT_KEY, previousUpdatedAt);
				}
			}

			normalizeRemotePayload(payload) {
				if (!payload || typeof payload !== 'object') {
					return null;
				}
				if (payload.data && typeof payload.data === 'object') {
					return payload;
				}
				return {
					updatedAt: '',
					previousUpdatedAt: '',
					data: payload
				};
			}

			addSyncError(message) {
				const timestamp = new Date().toISOString();
				this.syncErrors.push(`${timestamp}: ${message}`);
				if (this.syncErrors.length > 30) {
					this.syncErrors.shift();
				}
				this.updateSyncErrorIndicator();
			}

			consumeSyncErrors() {
				const result = [...this.syncErrors];
				this.syncErrors = [];
				this.updateSyncErrorIndicator();
				return result;
			}

			updateSyncErrorIndicator() {
				const settingsButton = document.getElementById('editSettings');
				if (settingsButton) {
					settingsButton.classList.toggle('has-errors', this.syncErrors.length > 0);
				}
			}

			async pullFromWebDav(createIfMissing = false) {
				if (!this.webDavSettings) {
					return;
				}
				try {
					const response = await fetch(this.getWebDavFileUrl(), {
						method: 'GET',
						headers: {
							'Authorization': this.getWebDavAuthHeader()
						}
					});
					if (response.status === 404) {
						if (createIfMissing) {
							this.scheduleWebDavPush(true);
						}
						return;
					}
					if (!response.ok) {
						this.addSyncError(`WebDAV pull failed with HTTP ${response.status}`);
						return;
					}
					const text = await response.text();
					if (!text.trim()) {
						return;
					}
					const parsed = JSON.parse(text);
					const payload = this.normalizeRemotePayload(parsed);
					if (!payload || !payload.data || this.selectedEntry) {
						return;
					}
					const remoteUpdatedAt = payload.updatedAt || '';
					if (remoteUpdatedAt && remoteUpdatedAt === this.getLocalWebDavUpdatedAt()) {
						return;
					}
					this.isApplyingRemoteData = true;
					this.setWaterDataSnapshot(payload.data);
					this.setLocalWebDavUpdatedAt(remoteUpdatedAt);
					this.currentAmount = this.getLastAmount();
					this.cursorIndex = this.currentAmount ? CONFIG.formatAmount(this.currentAmount).length : 0;
					this.updateDateTimeInput();
					this.updateAmountDisplay();
					this.updateUI();
					this.isApplyingRemoteData = false;
				} catch (e) {
					console.error('WebDAV pull failed:', e);
					this.addSyncError(`WebDAV pull failed (${e.message || 'network error'})`);
					this.isApplyingRemoteData = false;
				}
			}

			async pushToWebDav() {
				if (!this.webDavSettings) {
					return;
				}
				const currentUpdatedAt = this.getLocalWebDavUpdatedAt();
				const payload = {
					previousUpdatedAt: currentUpdatedAt,
					updatedAt: new Date().toISOString(),
					data: this.getWaterDataSnapshot()
				};
				try {
					const response = await fetch(this.getWebDavFileUrl(), {
						method: 'PUT',
						headers: {
							'Authorization': this.getWebDavAuthHeader(),
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(payload)
					});
					if (response.ok) {
						this.setLocalWebDavPreviousUpdatedAt(payload.previousUpdatedAt);
						this.setLocalWebDavUpdatedAt(payload.updatedAt);
					} else {
						this.addSyncError(`WebDAV push failed with HTTP ${response.status}`);
					}
				} catch (e) {
					console.error('WebDAV push failed:', e);
					this.addSyncError(`WebDAV push failed (${e.message || 'network error'})`);
				}
			}

			scheduleWebDavPush(immediate = false) {
				if (!this.webDavSettings) {
					return;
				}
				if (this.webDavPushTimer) {
					clearTimeout(this.webDavPushTimer);
				}
				this.webDavPushTimer = setTimeout(() => {
					this.webDavPushTimer = null;
					this.pushToWebDav();
				}, immediate ? 0 : 500);
			}

			initializeWebDavSync(restart = false) {
				if (restart && this.webDavPollTimer) {
					clearInterval(this.webDavPollTimer);
					this.webDavPollTimer = null;
				}
				if (!this.webDavSettings || this.webDavPollTimer) {
					return;
				}
				this.pullFromWebDav(true);
				this.webDavPollTimer = setInterval(() => {
					this.pullFromWebDav(false);
				}, CONFIG.WEBDAV_SYNC_INTERVAL_MS);
			}

			// Data Storage
			getStorageKey(date) {
				return `water_${date.getFullYear()}_${date.getMonth() + 1}_${date.getDate()}`;
			}
			
			getEntries(date, raw=false) { // for a calendar date, not a day date (which starts at DAY_START_HOUR)
				const key = this.getStorageKey(date);
				const stored = localStorage.getItem(key);
				try {
					let result = stored ? JSON.parse(stored) : [];
					if (raw) {
						return result;
					} else {
						result.forEach((entry, index) => {
							entry.date = new Date(entry.time);
							entry.index = index;
						});
						return result;
					}
				} catch (e) {
					console.error('Error parsing stored data:', e);
					return [];
				}
			}
			
			saveEntries(date, entries) {
				const json = JSON.stringify(entries);
				const key = this.getStorageKey(date);
				if(json === '[]') {
					localStorage.removeItem(key);
				} else {
					localStorage.setItem(key, json);
				}
				if (!this.isApplyingRemoteData) {
					this.scheduleWebDavPush();
				}
			}
			
			cleanup() {
				const cutoff = new Date();
				cutoff.setDate(cutoff.getDate() - CONFIG.MAX_AGE_DAYS);
				
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key.startsWith('water_')) {
						const [_, year, month, day] = key.split('_').map(Number);
						const date = new Date(year, month - 1, day);
						if (date < cutoff) {
							localStorage.removeItem(key);
						}
					}
				}
			}
			
			// Entry Management, stored by calendar date, not day date
			addEntry(date, amount, type) {
				const entries = this.getEntries(date, true);
				entries.push({
					time: date.toISOString(),
					amount: Number(amount),
					type // 'filled' or 'drunk'
				});
				entries.sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());
				this.saveEntries(date, entries);
			}
			
			deleteEntry(date, entryIndex) {
				const entries = this.getEntries(date, true);
				entries.splice(entryIndex, 1);
				this.saveEntries(date, entries);
			}
			
			// Read entries for a day date, starting at DAY_START_HOUR
			getDayEntries(date) {
				const strippedDate = new Date(date);
				strippedDate.setHours(0, 0, 0, 0);
				const entries = [...this.getEntries(strippedDate), ...this.getEntries(new Date(strippedDate.getTime() + 86400000))];
				return entries.filter(entry => CONFIG.getDayDate(new Date(entry.time)).getTime() === strippedDate.getTime());
			}

			// Week Management
			getWeekDates(date) {
				const result = [];
				const start = new Date(date);
				// Go to Sunday
				start.setDate(start.getDate() - start.getDay());
				
				for (let i = 0; i < 7; i++) {
					const day = new Date(start);
					day.setDate(day.getDate() + i);
					result.push(day);
				}
				return result;
			}
			
			getDaySum(date) {
				const entries = this.getDayEntries(date);
				return [entries.length, entries.reduce((sum, entry) => {
					return sum + entry.amount;
				}, 0)];
			}
			
			// UI Management
			initializeUI() {
				// Week Navigation
				document.getElementById('prevWeek').addEventListener('click', () => {
					this.currentDate.setDate(this.currentDate.getDate() - 7);
					this.updateUI();
				});
				
				document.getElementById('nextWeek').addEventListener('click', () => {
					this.currentDate.setDate(this.currentDate.getDate() + 7);
					this.updateUI();
				});

				document.getElementById('editSettings').addEventListener('click', () => {
					if (this.syncErrors.length) {
						const errors = this.consumeSyncErrors();
						alert(`Sync errors:\n\n${errors.join('\n')}`);
						return;
					}
					const settings = this.promptWebDavSettings(this.webDavSettings);
					if (settings) {
						this.saveWebDavSettings(settings);
						this.initializeWebDavSync(true);
					}
				});
				this.updateSyncErrorIndicator();
				
				document.getElementById('currentWeek').addEventListener('click', () => {
					this.currentDate = CONFIG.getDayDate(new Date());
					this.updateUI();
				});

				// Date Input
				document.getElementById('datetime').addEventListener('change', (e) => {
					this.entryDate = this.parseDateTime(e.target.value);
					this.entryDateIsSet = !!this.selectedEntry || this.formatDateTime(this.entryDate) !== this.formatDateTime(new Date()); /* in edit mode, the date is always set */
					this.updateDateTimeInput();
				});

				document.getElementById('datetimeReset').addEventListener('click', () => {
					this.entryDate = new Date();
					this.entryDateIsSet = !!this.selectedEntry;
					this.updateDateTimeInput();
				});

				document.getElementById('datetimePrev').addEventListener('click', () => {
					this.shiftEntryDateByInterval(-1);
				});

				document.getElementById('datetimeNext').addEventListener('click', () => {
					this.shiftEntryDateByInterval(1);
				});
				
				// Update numpad handling
				document.querySelectorAll('.num-button').forEach(button => {
					button.addEventListener('click', () => {
						this.handleNumpadInput(button.dataset.value);
					});
				});

				// Create preset buttons
				const presetsContainer = document.querySelector('.input-presets');
				CONFIG.PRESETS.forEach(preset => {
					const button = document.createElement('button');
					button.className = 'preset-button';
					button.textContent = `${CONFIG.formatAmount(preset)}ℓ`;
					button.dataset.value = CONFIG.formatAmount(preset);
					button.addEventListener('click', () => {
						this.currentAmount = parseFloat(button.dataset.value);
						this.cursorIndex = CONFIG.formatAmount(this.currentAmount).length;
						if (!this.selectedEntry) {
							this.saveLastAmount(this.currentAmount);
						}
						this.updateAmountDisplay();
					});
					presetsContainer.appendChild(button);
				});
				
				// Submit Buttons
				document.getElementById('submitFilled').addEventListener('click', () => this.handleSubmit('filled'));
				document.getElementById('submitDrunk').addEventListener('click', () => this.handleSubmit('drunk'));
				
				// Edit Actions
				document.getElementById('deleteEntry').addEventListener('click', () => {
					if (this.selectedEntry) {
						this.deleteEntry(this.selectedEntry.date, this.selectedEntry.index);
						this.exitEditMode(true);
						this.showFloatingIcon('#icon-delete');
					}
				});
				
				document.getElementById('cancelEdit').addEventListener('click', () => {
					this.exitEditMode(true);
				});
				
				// Initial UI update
				this.updateDateTimeInput();
				this.updateAmountDisplay();
				this.updateUI();
			}
			
			updateUI() {
				this.updateWeekDisplay();
				this.updateDaysList();
				this.updateNavigationState();
			}
			
			updateWeekDisplay() {
				const week = CONFIG.getWeekNumber(this.currentDate);
				document.getElementById('currentWeek').classList.toggle('disabled', week === CONFIG.getWeekNumber(CONFIG.getDayDate(new Date())));
				document.getElementById('currentWeek').textContent = 
					`KW ${week}/${this.currentDate.getFullYear()}`;
			}
			
			updateNavigationState() {
				const now = CONFIG.getDayDate(new Date());
				const currentWeek = CONFIG.getWeekNumber(now);
				const selectedWeek = CONFIG.getWeekNumber(this.currentDate);
				const currentYear = now.getFullYear();
				const selectedYear = this.currentDate.getFullYear();
				
				document.getElementById('nextWeek').disabled = 
					(selectedYear > currentYear) || 
					(selectedYear === currentYear && selectedWeek >= currentWeek);
			}
			
			updateDaysList() {
				const daysContainer = document.querySelector('.days');
				daysContainer.innerHTML = '';
				
				this.getWeekDates(this.currentDate).forEach(date => {
					const dayElement = this.createDayElement(date);
					daysContainer.appendChild(dayElement);
				});
			}
			
			createDayElement(date) {
				const dayDiv = document.createElement('div');
				dayDiv.className = 'day';
				if (CONFIG.isToday(date)) {
					dayDiv.classList.add('today');
				}
				
				// Date
				const dateDiv = document.createElement('div');
				dateDiv.className = 'day-date';
				dateDiv.textContent = CONFIG.formatDate(date, true);
				dateDiv.addEventListener('click', () => {
					this.setEntryDateFromDay(date);
				});
				
				// Entries
				const entriesDiv = document.createElement('div');
				entriesDiv.className = 'day-entries';
				
				const entries = this.getDayEntries(date);
				entries.reverse().forEach(entry => {  // using rtl order for right-alignment and scroll, so reverse to have newest entries at the end still
					const entryDiv = this.createEntryElement(entry);
					entriesDiv.appendChild(entryDiv);
				});
				
				// Sum
				const sumDiv = document.createElement('div');
				sumDiv.className = 'day-sum';
				const [count, liters] = this.getDaySum(date);
				const countDiv = document.createElement('div');
				countDiv.className = 'day-sum-count';
				countDiv.textContent = count ? `${count}×` : '';
				sumDiv.appendChild(countDiv);
				const litersDiv = document.createElement('div');
				litersDiv.className = 'day-sum-liters';
				litersDiv.textContent = CONFIG.formatAmount(liters) + 'ℓ';
				sumDiv.appendChild(litersDiv);
				
				dayDiv.appendChild(dateDiv);
				dayDiv.appendChild(entriesDiv);
				dayDiv.appendChild(sumDiv);
				
				return dayDiv;
			}
			
			createEntryElement(entry) {
				const entryDiv = document.createElement('div');
				entryDiv.className = 'entry';
				entryDiv.dataset.entryTime = entry.time;
				entryDiv.dataset.entryAmount = Number(entry.amount);
				entryDiv.dataset.entryType = entry.type;
				if (this.selectedEntry && 
					this.selectedEntry.date.getTime() === entry.date.getTime() && 
					this.selectedEntry.index === entry.index) {
					entryDiv.classList.add('selected');
				} else if (this.isRecentSubmittedEntry(entry)) {
					entryDiv.classList.add('recent');
				}
				
				const timeRow = document.createElement('div');
				timeRow.className = 'entry-time-row';

				if (entry.type === 'filled') {
					const iconFilled = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
					iconFilled.classList.add('entry-icon');
					const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
					use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#icon-filled');
					iconFilled.appendChild(use);
					timeRow.appendChild(iconFilled);
				}
				
				const timeDiv = document.createElement('div');
				timeDiv.className = 'entry-time';
				timeDiv.textContent = CONFIG.formatTime(new Date(entry.time));
				timeRow.appendChild(timeDiv);

				if (entry.type === 'drunk') {
					const iconDrunk = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
					iconDrunk.classList.add('entry-icon');
					const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
					use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#icon-drunk');
					iconDrunk.appendChild(use);
					timeRow.appendChild(iconDrunk);
				}
				
				const amountDiv = document.createElement('div');
				amountDiv.className = 'entry-amount';
				amountDiv.textContent = CONFIG.formatAmount(entry.amount) + 'ℓ';
				
				entryDiv.appendChild(timeRow);
				entryDiv.appendChild(amountDiv);
				
				entryDiv.addEventListener('click', () => {
					if (this.selectedEntry &&
						this.selectedEntry.date.getTime() === entry.date.getTime() &&
						this.selectedEntry.index === entry.index) {
						this.exitEditMode(true);
					} else {
						this.enterEditMode(entry);
					}
				});
				
				return entryDiv;
			}

			markRecentSubmittedEntry(date, amount, type) {
				this.recentSubmittedEntry = {
					time: new Date(date).toISOString(),
					amount: Number(amount),
					type: type
				};
			}

			isRecentSubmittedEntry(entry) {
				if (!this.recentSubmittedEntry) {
					return false;
				}
				return entry.time === this.recentSubmittedEntry.time &&
					Number(entry.amount) === this.recentSubmittedEntry.amount &&
					entry.type === this.recentSubmittedEntry.type;
			}

			triggerRecentEntryFade() {
				if (!this.recentSubmittedEntry) {
					return;
				}
				const recentEntry = this.recentSubmittedEntry;
				const recentElement = Array.from(document.querySelectorAll('.entry.recent')).find((entryEl) => {
					return entryEl.dataset.entryTime === recentEntry.time &&
						Number(entryEl.dataset.entryAmount) === recentEntry.amount &&
						entryEl.dataset.entryType === recentEntry.type;
				});
				if (recentElement) {
					requestAnimationFrame(() => {
						recentElement.classList.remove('recent');
					});
				}
				setTimeout(() => {
					if (this.recentSubmittedEntry === recentEntry) {
						this.recentSubmittedEntry = null;
					}
				}, CONFIG.RECENT_ENTRY_FADE_MS);
			}
			
			updateAmountDisplay() {
				const formattedFull = CONFIG.formatAmount(this.currentAmount);
				const hasDecimal = formattedFull.slice(0, this.cursorIndex).includes('.');
				const maxLength = hasDecimal ? 4 : 3;
				const isAtMax = this.cursorIndex >= maxLength;

				document.querySelectorAll('.preset-button').forEach(button => {
					button.classList.toggle('preset-button-current', button.dataset.value === formattedFull);
				});

				document.querySelector('.amount-display-typed').textContent = formattedFull.slice(0, this.cursorIndex);
				document.querySelector('.amount-display-remaining').textContent = formattedFull.slice(this.cursorIndex);
				document.querySelector('.amount-display-unit').classList.toggle('grey', this.cursorIndex === 0);
				
				document.querySelectorAll('.num-button').forEach(button => {
					const value = button.dataset.value;
					if (value === '.') {
						button.textContent = isAtMax ? 'C' : '.';
						button.disabled = hasDecimal && !isAtMax;
					}
					if (value.match(/[0-9]/)) {
						button.disabled = isAtMax;
					}
					if (value === '←') {
						button.disabled = this.cursorIndex === 0;
					}
				});

				document.querySelectorAll('.submit-button').forEach(button => {
					button.disabled = this.currentAmount === 0;
				});
			}
			
			updateDateTimeInput() {
				const input = document.getElementById('datetime');
				const resetButton = document.getElementById('datetimeReset');
				const nowLabel = document.getElementById('datetimeNow');
				input.value = this.formatDateTime(this.entryDate);
				resetButton.classList.toggle('hidden', !this.entryDateIsSet);
				nowLabel.classList.toggle('hidden', this.entryDateIsSet);
			}

			setEntryDateFromDay(dayDate) {
				const selectedDay = new Date(dayDate);
				selectedDay.setHours(0, 0, 0, 0);
				const today = CONFIG.getDayDate(new Date());

				if (selectedDay.getTime() === today.getTime()) {
					this.entryDate = new Date();
					this.entryDateIsSet = !!this.selectedEntry;
				} else if (selectedDay.getTime() < today.getTime()) {
					const entryDate = new Date(selectedDay);
					entryDate.setDate(entryDate.getDate() + 1);
					entryDate.setHours(CONFIG.DAY_START_HOUR, 0, 0, 0);
					entryDate.setMinutes(entryDate.getMinutes() - 1);
					this.entryDate = entryDate;
					this.entryDateIsSet = true;
				} else {
					const entryDate = new Date(selectedDay);
					entryDate.setHours(CONFIG.DAY_START_HOUR, 0, 0, 0);
					this.entryDate = entryDate;
					this.entryDateIsSet = true;
				}

				this.updateDateTimeInput();
			}

			shiftEntryDateByInterval(direction) {
				const d = new Date(this.entryDate);
				d.setSeconds(0, 0);
				const minutes = d.getMinutes();
				const step = CONFIG.DATETIME_SHIFT_MINUTES;
				const isBoundary = minutes % step === 0;

				if (direction < 0) {
					if (isBoundary) {
						d.setMinutes(minutes - step);
					} else {
						d.setMinutes(Math.floor(minutes / step) * step);
					}
				} else if (direction > 0) {
					if (isBoundary) {
						d.setMinutes(minutes + step);
					} else {
						d.setMinutes(Math.ceil(minutes / step) * step);
					}
				}

				this.entryDate = d;
				this.entryDateIsSet = true;
				this.updateDateTimeInput();
			}
			
			formatDateTime(date) {
				return `${CONFIG.formatDate(date)} ${CONFIG.formatTime(date)}`;
			}

			parseDateTime(input) {
				const parts = input.split(/[^0-9]+/).filter(Boolean);
				let now = new Date();
				let day = now.getDate();
				let month = now.getMonth() + 1;
				let year = now.getFullYear();
				let hours = now.getHours();
				let minutes = now.getMinutes();
				if(parts.length === 0) {
					return now;
				} else if(parts.length === 1) {
					hours = parts[0];
					minutes = 0;
				} else if(parts.length === 2) {
					hours = parts[0];
					minutes = parts[1];
				} else if(parts.length === 3) {
					day = parts[0];
					hours = parts[1];
					minutes = parts[2];
				} else if(parts.length === 4) {
					day = parts[0];
					month = parts[1];
					hours = parts[2];
					minutes = parts[3];
				} else {
					day = parts[0];
					month = parts[1];
					year = parts[2];
					hours = parts[3];
					minutes = parts[4];
				}
				const date = new Date(year, month - 1, day, hours, minutes);
				return isNaN(date.getTime()) ? now : date;
			}
			
			enterEditMode(entry) {
				if (!this.selectedEntry) { // if we're not editing yet, store the current amount
					this.currentAmountBeforeEdit = this.currentAmount;
				}
				this.selectedEntry = entry;
				this.entryDate = new Date(entry.time);
				this.entryDateIsSet = true;
				this.currentAmount = entry.amount;
				this.cursorIndex = CONFIG.formatAmount(this.currentAmount).length;
				
				// Update UI
				document.querySelector('.input').classList.add('mode-edit');
				// Highlight the correct submit button
				document.getElementById('submitFilled').classList.toggle('selected', entry.type === 'filled');
				document.getElementById('submitDrunk').classList.toggle('selected', entry.type === 'drunk');
				
				this.updateDateTimeInput();
				this.updateAmountDisplay();
				this.updateUI();
			}
			
			exitEditMode(restoreAmount = false) {
				this.selectedEntry = null;
				this.entryDate = new Date();
				this.entryDateIsSet = false;
				if (restoreAmount && this.currentAmountBeforeEdit !== null) {
					this.currentAmount = this.currentAmountBeforeEdit;
				}
				this.currentAmountBeforeEdit = null;
				this.cursorIndex = CONFIG.formatAmount(this.currentAmount).length;
				
				// Update UI
				document.querySelector('.input').classList.remove('mode-edit');
				document.getElementById('submitFilled').classList.remove('selected');
				document.getElementById('submitDrunk').classList.remove('selected');
				
				this.updateDateTimeInput();
				this.updateAmountDisplay();
				this.updateUI();
			}
			
			showFloatingIcon(iconId) {
				// Show floating icon
				const floatingIcon = document.createElement('div');
				floatingIcon.className = 'floating-icon';
				const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
				icon.setAttribute('width', '100%');
				icon.setAttribute('height', '100%');
				icon.setAttribute('viewBox', '0 0 24 24');
				const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
				use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', iconId);
				icon.appendChild(use);
				floatingIcon.appendChild(icon);
				document.body.appendChild(floatingIcon);

				// Remove floating icon after animation
				setTimeout(() => {
					floatingIcon.remove();
				}, 1000);
			}

			handleSubmit(type) {
				let amount = parseFloat(this.currentAmount);
				const submittedDate = new Date(this.entryDate);
				
				if (isNaN(amount) || amount <= 0 || amount > CONFIG.MAX_AMOUNT) {
					return;
				}

				this.saveLastAmount(amount);

				if (this.selectedEntry) {
					this.deleteEntry(this.selectedEntry.date, this.selectedEntry.index);
					this.addEntry(submittedDate, amount, type);
					this.markRecentSubmittedEntry(submittedDate, amount, type);
					this.exitEditMode(false);
				} else {
					this.addEntry(submittedDate, amount, type);
					this.markRecentSubmittedEntry(submittedDate, amount, type);
					this.entryDate = new Date();
					this.entryDateIsSet = false;
					this.cursorIndex = CONFIG.formatAmount(this.currentAmount).length;
					this.updateDateTimeInput();
					this.updateAmountDisplay();
					this.updateUI();
				}
				this.triggerRecentEntryFade();

				this.showFloatingIcon(type === 'filled' ? '#icon-filled' : '#icon-drunk');
			}

			handleNumpadInput(value) {
				const formattedFull = CONFIG.formatAmount(this.currentAmount);
				const hasDecimal = formattedFull.slice(0, this.cursorIndex).includes('.');
				const maxLength = hasDecimal ? 4 : 3;
				const isAtMax = this.cursorIndex >= maxLength;

				if (value === '←') {
					if (this.cursorIndex > 0) {
						this.currentAmount = parseFloat(formattedFull.slice(0, this.cursorIndex - 1)) || 0;
						this.cursorIndex--;
					}
				} else if (value === '.' && isAtMax) {
					// Clear when "C" is pressed
					this.currentAmount = 0;
					this.cursorIndex = 0;
				} else if (value === '.') {
					if (!formattedFull.slice(0, this.cursorIndex).includes('.')) {
						this.cursorIndex = formattedFull.indexOf('.') + 1;
					}
				} else if (value.match(/[0-9]/)) {
					if (!isAtMax) {
						if (formattedFull.slice(0, this.cursorIndex) === '0') {
							this.currentAmount = value;
							this.cursorIndex = 1;
						} else {
							this.currentAmount = parseFloat(formattedFull.slice(0, this.cursorIndex) + value);
							this.cursorIndex++;
						}
					}
				}
				if (!this.selectedEntry) {
					this.saveLastAmount(this.currentAmount);
				}
				this.updateAmountDisplay();
			}
		}
		
		// Initialize the app
		document.addEventListener('DOMContentLoaded', () => {
			window.app = new WaterTracker();
	   
			const buttonSelector = 'button, .entry';

			const removeAllHover = () => {
				document.querySelectorAll('.hover').forEach(el => el.classList.remove('hover'));
			}

			// Touch event handling for buttons and entries
			document.addEventListener('touchstart', (e) => {
				removeAllHover();
				const target = e.target.closest(buttonSelector);
				if (target && !target.disabled && !target.classList.contains('disabled')) {
					target.classList.add('hover');
				}
			}, { passive: true });

			document.addEventListener('touchend', (e) => {
				removeAllHover();
			}, { passive: true });

			document.addEventListener('touchcancel', () => {
				removeAllHover();
			}, { passive: true });

			// Handle case where touch moves outside the element
			document.addEventListener('touchmove', (e) => {
				const touch = e.touches[0];
				const hoveredElement = document.elementFromPoint(touch.clientX, touch.clientY);

				// Remove hover from all elements that are not currently being touched
				document.querySelectorAll('.hover').forEach(el => {
					if (!hoveredElement || !el.contains(hoveredElement)) {
						el.classList.remove('hover');
					}
				});


			}, { passive: true });
		});
	</script>
</body>
